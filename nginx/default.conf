# Reverse proxy in front of the Koentji app container.
#
# Why this exists: the Leptos WASM bundle in /pkg is the largest asset by far
# and was served raw. On a slow/remote link the download stalls, the browser's
# Range-resume retries fail, hydration never runs, and client-rendered pages
# (e.g. /analytics) render blank. gzip here shrinks the bundle ~2.5-4x and ends
# the broken partial-content resume loop.
#
# Compression is done at the edge, NOT in the app: actix's in-process Compress
# middleware corrupts Leptos's chunked SSR/hydration stream. nginx compresses
# the already-rendered bytes that the browser transparently decodes, so the
# stream's framing is untouched — verified that login (which needs hydration)
# works through this proxy. text/html is always gzipped by nginx when gzip is
# on; that is safe here for the same reason.

upstream koentji_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Don't advertise the exact nginx version in Server/error headers.
    server_tokens off;

    # Security response headers. Applied per-location below because a
    # location with its own `add_header` (e.g. /pkg/ Cache-Control) does
    # NOT inherit server-level `add_header` directives in nginx.
    #
    # HSTS is intentionally omitted: this stack is fronted by http-only
    # nginx, so Strict-Transport-Security would be meaningless (and is
    # ignored by browsers over http). Enable it at the TLS terminator:
    #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    # text/html is always compressed; these add the static-asset types
    # (the WASM bundle is the one that matters).
    gzip_types
        application/wasm
        application/javascript
        text/javascript
        text/css
        application/json
        image/svg+xml;

    # Hashed bundle filenames are immutable — cache hard so a successful
    # download is paid once. Single Cache-Control header (no `expires`, which
    # would emit a second one).
    location /pkg/ {
        proxy_pass http://koentji_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        proxy_pass http://koentji_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Clickjacking: the admin dashboard performs destructive actions,
        # so it must never be framable. Both headers for broad coverage.
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}
