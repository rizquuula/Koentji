services:
  app:
    container_name: koentji-app
    image: ghcr.io/rizquuula/koentji:latest
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://koentji:koentji@db:5432/koentjilab}
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-string-at-least-64-bytes-long}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - FREE_TRIAL_KEY=${FREE_TRIAL_KEY:-FREE_TRIAL}
      - AUTH_CACHE_TTL_SECONDS=${AUTH_CACHE_TTL_SECONDS:-900}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://koentji:koentji@clickhouse:8123/koentji}
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    env_file:
      - path: .env
        required: false

  clickhouse:
    container_name: koentji-clickhouse
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: koentji
      CLICKHOUSE_USER: koentji
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-koentji}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CH_PORT:-8123}:8123"
    volumes:
      - chdata:/var/lib/clickhouse
      - ./clickhouse/config.d/low-mem.xml:/etc/clickhouse-server/config.d/low-mem.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    env_file:
      - path: .env
        required: false

  db:
    container_name: koentji-db
    image: ${DB_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-koentji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koentji}
      POSTGRES_DB: ${POSTGRES_DB:-koentjilab}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koentji} -d ${POSTGRES_DB:-koentjilab}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - path: .env
        required: false

volumes:
  pgdata:
  chdata:
