name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "style/**"
      - "end2end/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: koentji
          POSTGRES_PASSWORD: koentji
          POSTGRES_DB: koentjilab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U koentji"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      E2E_DATABASE_URL: postgres://koentji:koentji@127.0.0.1:5432/koentjilab_test
      E2E_DB_NAME: koentjilab_test
      E2E_DB_USER: koentji
      E2E_DB_PASSWORD: koentji
      E2E_DB_HOST: 127.0.0.1
      E2E_DB_PORT: "5432"
      E2E_ADMIN_USERNAME: e2eadmin
      E2E_ADMIN_PASSWORD: e2eadmin
      E2E_FREE_TRIAL_KEY: FREE_TRIAL
      E2E_SECRET_KEY: koentji-e2e-secret-key-that-is-at-least-64-bytes-long-aaaaaaaaaaaaaaaaa

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-e2e-

      - name: Install cargo-leptos
        run: cargo install cargo-leptos --locked

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: end2end/package.json

      - name: Install root npm deps (tailwindcss)
        run: npm install

      - name: Install Playwright deps
        working-directory: end2end
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Build Tailwind
        run: npx tailwindcss -i style/input.css -o style/output.css --minify

      - name: Run E2E tests
        working-directory: end2end
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: end2end/playwright-report
          retention-days: 14
